name: aive-dry-run

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate findings
        run: python scripts/scan_repo.py . --output artifacts/findings.json

      - name: Generate patch plan
        run: python scripts/patch_plan.py artifacts/findings.json --output artifacts/patch-plan.md

      - name: Run verification
        run: python scripts/verify_repo.py . --json > artifacts/verification.json

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aive-dry-run
          path: artifacts/
